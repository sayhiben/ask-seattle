services:
  ask-seattle:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      ASK_SEATTLE_NO_WRITE: "1"
      ASK_SEATTLE_TORCH_DEVICE: cpu
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
      - ./models:/app/models
      - ./reports:/app/reports
    command: ["ask-seattle", "stream"]
